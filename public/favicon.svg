<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Dark Red Circular Arc Swoosh on the right side -->
  <path d="M250,60 C380,60 460,150 460,256 C460,360 380,450 250,450" fill="none" stroke="#8B0000" stroke-width="24" stroke-linecap="round"/>

  <!-- Excavator silhouette -->
  <g fill="#27272a">
    <!-- Tracks -->
    <path d="M130,360 C130,345 145,330 165,330 L395,330 C415,330 430,345 430,360 C430,375 415,390 395,390 L165,390 C145,390 130,375 130,360 Z" />
    
    <!-- Drive wheels inside tracks -->
    <circle cx="165" cy="360" r="10" fill="#18181b" />
    <circle cx="220" cy="360" r="10" fill="#18181b" />
    <circle cx="275" cy="360" r="10" fill="#18181b" />
    <circle cx="330" cy="360" r="10" fill="#18181b" />
    <circle cx="385" cy="360" r="10" fill="#18181b" />

    <!-- Rotatable Base Platform -->
    <path d="M190,310 L370,310 L380,330 L180,330 Z" />

    <!-- Cabin Cab and Engine compartment -->
    <path d="M200,310 L200,240 Q200,210 230,210 L330,210 Q360,210 360,230 L370,310 Z" />

    <!-- Cabin Windows (transparent cutouts) -->
    <path d="M215,225 L255,225 L255,280 L215,280 Z" fill="#ffffff" opacity="0.35" />
    <path d="M265,225 L315,225 L315,280 L265,280 Z" fill="#ffffff" opacity="0.35" />

    <!-- Counterweight back curve -->
    <path d="M360,240 C370,240 380,250 380,265 L370,310 L350,310 Z" />

    <!-- Heavy Hydraulic Boom (Lower arm) -->
    <path d="M215,265 L110,120 L95,130 L195,280 Z" />
    <path d="M245,285 L150,190 L155,180 L255,270 Z" fill="#52525b" />

    <!-- Dipper Arm (Forearm) -->
    <path d="M110,120 L135,275 L115,280 L85,130 Z" />

    <!-- Bucket Linkage & Piston -->
    <path d="M100,135 L125,245" stroke="#52525b" stroke-width="8" stroke-linecap="round" />

    <!-- Excavator Bucket (Scoop) -->
    <path d="M135,275 C135,275 145,300 140,325 C135,345 110,365 85,365 C60,365 50,345 50,325 C50,310 60,295 80,295 L80,310 C68,310 65,320 65,327 C65,340 80,345 90,345 C105,345 115,335 118,320 C120,305 115,290 115,290 Z" />
    
    <!-- Teeth on the bucket -->
    <path d="M50,325 L40,323 L52,333 L42,333 L55,341 L45,343 M50,325 Z" />
  </g>
</svg>